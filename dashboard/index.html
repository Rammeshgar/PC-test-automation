<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeoplesDoctor QA Dashboard</title>
    <style>
        :root { --bg: #0d1117; --text: #c9d1d9; --pass: #238636; --fail: #da3633; --card: #161b22; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        h1 { text-align: center; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .grid { display: flex; gap: 20px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 8px; padding: 20px; width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 15px; font-weight: bold; font-size: 14px; margin-bottom: 15px;}
        .passed { background: var(--pass); color: white; }
        .failed { background: var(--fail); color: white; }
        .meta { font-size: 13px; color: #8b949e; line-height: 1.6; }
        .screenshot { width: 100%; margin-top: 10px; border-radius: 5px; border: 1px solid #30363d; }
    </style>
</head>
<body>

    <h1>🚀 Automated QA Dashboard</h1>

    <div class="grid">
        <!-- Smoke Test Card -->
        <div class="card" id="smoke-card">
            <h2>💨 10-Minute Smoke Test</h2>
            <div id="smoke-status" class="status-badge">Loading...</div>
            <div class="meta">
                <p><strong>Last Run:</strong> <span id="smoke-time">...</span></p>
                <p><strong>Environment:</strong> Production</p>
            </div>
            <h3>Latest Failure Screenshot:</h3>
            <div id="smoke-screenshots">No failures! 🎉</div>
        </div>

        <!-- Regression Test Card -->
        <div class="card" id="regression-card">
            <h2>🔍 Hourly Regression Test</h2>
            <div id="regression-status" class="status-badge">Loading...</div>
            <div class="meta">
                <p><strong>Last Run:</strong> <span id="regression-time">...</span></p>
                <p><strong>Environment:</strong> Production</p>
            </div>
            <h3>Latest Failure Screenshot:</h3>
            <div id="regression-screenshots">No failures! 🎉</div>
        </div>
    </div>

    <script>
        // You can write whatever JS you want here! This grabs the JSON files generated by GitHub Actions.
        async function loadData(testName, cardPrefix) {
            try {
                // Fetch the json file generated by the GitHub Action
                const response = await fetch(`${testName}-data.json?t=${new Date().getTime()}`, { cache: "no-store" });
                if (!response.ok) throw new Error("No data yet");
                const data = await response.json();

                // Update Status Badge
                const statusEl = document.getElementById(`${cardPrefix}-status`);
                statusEl.innerText = data.status === 'success' ? '✅ PASSED' : '❌ FAILED';
                statusEl.className = `status-badge ${data.status === 'success' ? 'passed' : 'failed'}`;

                // Update Timestamp
                document.getElementById(`${cardPrefix}-time`).innerText = new Date(data.timestamp).toLocaleString();

                // Update Screenshots if failed
                if (data.status === 'failure' && data.screenshots.length > 0) {
                    const imgContainer = document.getElementById(`${cardPrefix}-screenshots`);
                    // Just show the last screenshot taken (usually the exact point of failure)
                    const lastImage = data.screenshots[data.screenshots.length - 1];
                    imgContainer.innerHTML = `<a href="${lastImage}" target="_blank"><img src="${lastImage}" class="screenshot"></a>`;
                }
            } catch (e) {
                console.log(`Waiting for first run of ${testName}...`);
            }
        }

        loadData('smoke', 'smoke');
        loadData('regression', 'regression');
    </script>
</body>
</html>
